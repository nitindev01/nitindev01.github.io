<!DOCTYPE html>
<html>
<head>
    <title>Luxury Perfumes</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #f5f5f5;
        }

        header {
            background-color: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: gold;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1585386959984-a4155224a1f1') no-repeat center;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 50px;
        }

        .products {
            display: flex;
            justify-content: space-around;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 15px;
            width: 250px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card button {
            background: black;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        .card button:hover {
            background: gold;
            color: black;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>Luxury Perfumes</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    <h1>Discover Your Signature Scent</h1>
    <p>Premium fragrances for every occasion</p>
</div>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539">
        <h3>Rose Essence</h3>
        <p>₹999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1615634262417-1d9e2bb1d2b5">
        <h3>Ocean Mist</h3>
        <p>₹1299</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1587019158091-1a103c5dd17f">
        <h3>Midnight Oud</h3>
        <p>₹1999</p>
        <button>Buy Now</button>
    </div>

</div>

<footer>
    <p>© 2026 Luxury Perfumes | All Rights Reserved</p>
</footer>

</body>
</html>
